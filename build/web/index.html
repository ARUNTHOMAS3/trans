<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="/" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Clarity Over Complexity" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="zerpai_erp" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Zerpai ERP</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
    <!-- Speed Optimizations -->
    <link
      rel="preload"
      href="manifest.json"
      as="fetch"
      crossorigin="use-credentials"
    />

    <style>
      /* Critical CSS for Splash Screen - Instant Loading */
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc; /* Light grey background */
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      .brand-logo {
        font-size: 28px;
        font-weight: 800;
        color: #1f2937;
        margin-bottom: 24px;
        letter-spacing: -0.5px;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #2563eb; /* Zerpai Blue */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .loading-text {
        margin-top: 16px;
        color: #6b7280;
        font-size: 14px;
        font-weight: 500;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Instant Splash Screen -->
    <div id="loading_indicator" class="loading-container">
      <div class="brand-logo">Zerpai ERP</div>
      <div class="spinner"></div>
      <div class="loading-text">Initializing...</div>
    </div>

    <script>
      // PWA Install Prompt Capture
      let deferredPrompt;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        window.dispatchEvent(new Event("pwa-install-ready"));
        console.log("PWA Install Prompt captured");
      });

      window.showInstallPrompt = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`User response to the install prompt: ${outcome}`);
          deferredPrompt = null;
        }
      };

      // Watchdog timer: if app doesn't start in 12s, force remove splash
      const watchdog = setTimeout(function () {
        var loader = document.getElementById("loading_indicator");
        if (loader) {
          console.warn("Initialization watchdog triggered: Force removing splash screen after 12s");
          loader.style.opacity = "0";
          setTimeout(() => loader.parentNode && loader.parentNode.removeChild(loader), 400);
        }
      }, 12000);

      window.addEventListener("flutter-first-frame", function() {
        console.log("Flutter first frame rendered, removing splash screen...");
        var loader = document.getElementById("loading_indicator");
        if (loader) {
          loader.style.opacity = "0";
          setTimeout(function () {
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 400);
        }
        clearTimeout(watchdog);
      });
    </script>
    <script src="flutter_bootstrap.js" async></script>
    <script>
      // Service Worker Update Detection with safe reload
      if ('serviceWorker' in navigator) {
        console.log('Service worker support detected');
        
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          // Check if we already reloaded recently to prevent loops
          const lastReload = sessionStorage.getItem('last_sw_reload');
          const now = Date.now();
          if (!lastReload || (now - parseInt(lastReload)) > 10000) {
            sessionStorage.setItem('last_sw_reload', now.toString());
            console.warn('New app version detected. Reloading to apply updates...');
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
