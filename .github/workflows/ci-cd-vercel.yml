name: CI/CD (Frontend + Backend -> Vercel)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend_ci:
    name: Frontend CI (Flutter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install frontend dependencies
        run: flutter pub get

      - name: Analyze frontend
        run: flutter analyze --no-fatal-infos

      - name: Run frontend tests
        run: flutter test

      - name: Build frontend web
        run: flutter build web --release

  backend_ci:
    name: Backend CI (NestJS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test -- --runInBand --passWithNoTests
        env:
          DRIZZLE_DATABASE_URL: ${{ secrets.DRIZZLE_DATABASE_URL }}

  deploy_frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend_ci, backend_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Link Vercel project (frontend)
        run: |
          mkdir -p .vercel
          echo '{"projectId":"${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json

      - name: Pull Vercel project settings (frontend)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts (frontend)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy_backend:
    name: Deploy Backend (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend_ci, backend_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Link Vercel project (backend)
        run: |
          mkdir -p .vercel
          echo '{"projectId":"${{ secrets.VERCEL_BACKEND_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json

      - name: Pull Vercel project settings (backend)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts (backend)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy backend to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
