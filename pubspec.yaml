name: zerpai_erp
description: "Clarity Over Complexity."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8

  # UI / Visual
  flutter_colorpicker: ^1.1.0
  dotted_border: ^2.1.0
  lottie: ^3.3.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fl_chart: ^1.1.1

  # Fonts & Text
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^17.0.1

  # Backend
  supabase_flutter: ^2.11.0
  flutter_dotenv: ^5.2.1

  # Networking / Storage
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  internet_connection_checker: ^1.0.0+1

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.4.0
  crypto: ^3.0.6
  logger: ^2.6.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Device / File
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  file_picker: ^8.0.3
  flutter_image_compress: ^2.3.0

  # Web support (future Zerpai web)
  web: 1.1.0
  desktop_drop: ^0.5.0
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

dependency_overrides:
  source_gen: any
  analyzer: any

flutter:
  uses-material-design: true

  assets:
    - assets/.env
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-Italic.ttf
          style: italic
        - asset: assets/fonts/Inter-BoldItalic.ttf
          weight: 700
          style: italic
    - family: NotoSansFallback
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: NotoSansSymbols
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
    - family: NotoSansGujarati
      fonts:
        - asset: assets/fonts/NotoSansGujarati-Regular.ttf
    - family: NotoSansGurmukhi
      fonts:
        - asset: assets/fonts/NotoSansGurmukhi-Regular.ttf
    - family: NotoSansKannada
      fonts:
        - asset: assets/fonts/NotoSansKannada-Regular.ttf
    - family: NotoSansMalayalam
      fonts:
        - asset: assets/fonts/NotoSansMalayalam-Regular.ttf
    - family: NotoSansOriya
      fonts:
        - asset: assets/fonts/NotoSansOriya-Regular.ttf
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
